name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/backend

jobs:
  build-and-push:
    name: Build + push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via SSM
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC -> AWS STS
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gh-actions-hcp-deploy
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Render deploy script
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          mkdir -p /tmp/ssm
          # Unquoted EOF so $IMAGE, $GHCR_USER, $GHCR_TOKEN expand NOW (here in CI),
          # baking the real values into the script that EC2 will run.
          cat > /tmp/ssm/deploy.sh <<EOF
          #!/bin/bash
          set -euo pipefail

          echo "==> docker login ghcr.io"
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          echo "==> docker pull ${IMAGE}"
          docker pull ${IMAGE}

          echo "==> (re)create panel-api"
          docker rm -f panel-api 2>/dev/null || true
          docker run -d --name panel-api \\
            --restart=always \\
            --network host \\
            --env-file /opt/panel/backend/.env \\
            ${IMAGE} node src/server.js

          echo "==> (re)create panel-worker"
          docker rm -f panel-worker 2>/dev/null || true
          docker run -d --name panel-worker \\
            --restart=always \\
            --network host \\
            --env-file /opt/panel/backend/.env \\
            -v /home/ubuntu/devops-instances.pem:/keys/ec2.pem:ro \\
            -e EC2_SSH_PRIVATE_KEY_PATH=/keys/ec2.pem \\
            ${IMAGE} node src/workers/deploymentWorker.js

          echo "==> refresh frontend-dist on host"
          mkdir -p /opt/panel/frontend-dist
          docker cp panel-api:/app/frontend-dist/. /opt/panel/frontend-dist/

          echo "==> disable legacy systemd units"
          sudo systemctl disable --now panel-api panel-worker 2>/dev/null || true

          echo "==> smoke test /health"
          sleep 3
          curl -fsS http://127.0.0.1:4000/health
          echo ""

          docker image prune -f
          echo "==> deploy complete"
          EOF

      - name: Send deploy command via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail
          # Base64-encode the script so we never fight shell or JSON escaping again.
          SCRIPT_B64=$(base64 -w0 /tmp/ssm/deploy.sh)

          # Build the parameters file with jq (handles JSON escaping correctly).
          jq -n --arg cmd "echo $SCRIPT_B64 | base64 -d > /tmp/hcp-deploy.sh && bash /tmp/hcp-deploy.sh" \
            '{commands: [$cmd]}' > /tmp/ssm/params.json

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "GH Actions deploy ${GITHUB_SHA::7}" \
            --parameters file:///tmp/ssm/params.json \
            --query "Command.CommandId" --output text)
          echo "SSM command id: $CMD_ID"

          # Poll for completion (max ~5 min)
          for i in $(seq 1 60); do
            STATUS=$(aws ssm list-command-invocations --command-id "$CMD_ID" --details \
              --query "CommandInvocations[0].Status" --output text)
            echo "[$i] status: $STATUS"
            case "$STATUS" in
              Success)
                aws ssm list-command-invocations --command-id "$CMD_ID" --details \
                  --query "CommandInvocations[0].CommandPlugins[0].Output" --output text
                exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "----- STDOUT -----"
                aws ssm list-command-invocations --command-id "$CMD_ID" --details \
                  --query "CommandInvocations[0].CommandPlugins[0].Output" --output text || true
                echo "----- STDERR -----"
                aws ssm list-command-invocations --command-id "$CMD_ID" --details \
                  --query "CommandInvocations[0].StandardErrorContent" --output text || true
                exit 1 ;;
            esac
            sleep 5
          done

          echo "Timed out waiting for SSM command"
          exit 1
